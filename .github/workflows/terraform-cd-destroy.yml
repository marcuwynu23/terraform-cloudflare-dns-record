name: CD - Cloudflare DNS Record (Destroy)

on:
  workflow_dispatch:
    inputs:

      project_id:
        description: GCP project ID
        required: true
        type: string

      region:
        description: "GCP region (Free Tier: us-west1, us-central1, us-east1)"
        required: true
        type: string
        default: us-central1

      zone_id:
        description: Cloudflare Zone ID
        required: true
        type: string

      name:
        description: name
        required: true
        type: string

      type:
        description: type
        required: true
        type: string

      value:
        description: value
        required: true
        type: string

      ttl:
        description: ttl
        required: true
        type: string

      proxied:
        description: proxied
        required: true
        type: string

      priority:
        description: priority
        required: true
        type: string

env:
  TF_BUCKET_NAME: ${{ secrets.TF_BUCKET_NAME }}
  TF_BUCKET_PREFIX: ${{ secrets.TF_BUCKET_PREFIX }}
  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
jobs:
  destroy:
    name: Terraform Destroy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: latest
    - name: Terraform Init
      run: |
        terraform init \
          -backend-config="bucket=$TF_BUCKET_NAME" \
          -backend-config="prefix=$TF_BUCKET_PREFIX"
    - name: Terraform Plan
      run: |
        terraform plan -destroy  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="zone_id=${{ github.event.inputs.zone_id }}" \
          -var="name=${{ github.event.inputs.name }}" \
          -var="type=${{ github.event.inputs.type }}" \
          -var="value=${{ github.event.inputs.value }}" \
          -var="ttl=${{ github.event.inputs.ttl }}" \
          -var="proxied=${{ github.event.inputs.proxied }}" \
          -var="priority=${{ github.event.inputs.priority }}"
    - name: Terraform Destroy
      run: |
        terraform destroy -auto-approve  \
          -var="project_id=${{ github.event.inputs.project_id }}" \
          -var="region=${{ github.event.inputs.region }}" \
          -var="zone_id=${{ github.event.inputs.zone_id }}" \
          -var="name=${{ github.event.inputs.name }}" \
          -var="type=${{ github.event.inputs.type }}" \
          -var="value=${{ github.event.inputs.value }}" \
          -var="ttl=${{ github.event.inputs.ttl }}" \
          -var="proxied=${{ github.event.inputs.proxied }}" \
          -var="priority=${{ github.event.inputs.priority }}"
